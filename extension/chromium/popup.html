<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        background: #1c1c1e;
        color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        font-size: 13px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #8e8e93;
      }
      .dot.ok {
        background: #30d158;
      }
      .dot.bad {
        background: #ff453a;
      }
      p {
        color: #a1a1a6;
        line-height: 1.45;
      }
      code {
        color: #0a84ff;
      }
    </style>
  </head>
  <body>
    <h1>🔑 Arca</h1>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusText">Checking native host…</span>
    </div>
    <p id="detail">
      Vault unlock happens in the desktop app. This extension only relays
      requests to it through the native messaging host.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
